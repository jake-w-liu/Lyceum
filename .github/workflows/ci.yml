name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check:versions
      - run: npm run typecheck
      - run: npm run test:all
      - run: npm run audit
      - run: npm run build
      - run: npm run check:bundle

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM for Windows resource compilation
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Resolve-LlvmRcPath {
            if ($env:ProgramFiles) {
              $p = Join-Path $env:ProgramFiles "LLVM\bin\llvm-rc.exe"
              if (Test-Path $p) { return $p }
            }
            if ($env:ProgramFilesX86) {
              $p = Join-Path $env:ProgramFilesX86 "LLVM\bin\llvm-rc.exe"
              if (Test-Path $p) { return $p }
            }
            return $null
          }

          if (-not (Get-Command llvm-rc -ErrorAction SilentlyContinue)) {
            choco install llvm -y --no-progress --accept-package-agreements --accept-source-agreements
          }

          $llvmRc = Resolve-LlvmRcPath
          if (-not $llvmRc) {
            $llvmRcCmd = Get-Command llvm-rc -ErrorAction SilentlyContinue
            if ($llvmRcCmd) {
              $llvmRc = $llvmRcCmd.Source
            }
          }

          if (-not $llvmRc) {
            throw "llvm-rc was not found after attempting Chocolatey install."
          }

          $llvmDir = Split-Path -Parent $llvmRc
          "$llvmDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "RC=$llvmRc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RC_x86_64_pc_windows_msvc=$llvmRc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Format
        if: runner.os == 'Linux'
        working-directory: src-tauri
        run: cargo fmt --check
      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        working-directory: src-tauri
        run: cargo test

  rust-advisories:
    name: Rust Advisories
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo install cargo-audit --locked
      - working-directory: src-tauri
        run: cargo audit
